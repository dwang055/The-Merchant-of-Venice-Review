(function(){const t=document.getElementById("themeToggle");const s=localStorage.getItem("larc_app_theme")||"dark";function a(m){if(m==="light"){document.body.setAttribute("data-theme","light");t.textContent="☀️";}else{document.body.removeAttribute("data-theme");t.textContent="🌙";}localStorage.setItem("larc_app_theme",m);}a(s);t.addEventListener("click",()=>a(document.body.getAttribute("data-theme")==="light"?"dark":"light"));})();

document.querySelectorAll("#mainNav button").forEach(b=>{b.addEventListener("click",function(){document.querySelectorAll("#mainNav button").forEach(x=>x.classList.remove("active"));this.classList.add("active");currentTab=this.dataset.tab;renderContent();});});

function renderContent(){const c=document.getElementById("content");switch(currentTab){case"characters":renderCharacters(c);break;case"themes":renderThemes(c);break;case"symbols":renderSymbols(c);break;case"moments":renderMoments(c);break;case"quotes":renderQuotes(c);break;case"vocab":if(INCLUDE_VOCAB)renderVocab(c);break;case"map":renderKnowledgeMap(c);break;case"quiz":if(INCLUDE_QUIZZES)renderQuiz(c);break;}}

function tagChips(ids,type){return ids.map(id=>'<span class="chip" data-type="'+type+'" data-id="'+id+'" onclick="navigateById(\''+type+'\', \''+id+'\')">'+id+'</span>').join("");}

function navigateById(type,id){const tabMap={character:"characters",theme:"themes",symbol:"symbols",moment:"moments",quote:"quotes",vocab:"vocab"};const tab=tabMap[type];if(tab&&tab!==currentTab){document.querySelector('#mainNav button[data-tab="'+tab+'"]').click();}setTimeout(()=>{const el=document.getElementById("item-"+id);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},100);}

function renderCharacters(c){let h="<h2>Characters</h2>";APP.characters.forEach(ch=>{h+='<div class="card" id="item-'+ch.id+'"><h3>'+ch.name+' <small>('+(ch.role||"")+')</small></h3><p>'+(ch.description||"")+'</p>';if(ch.traits)h+="<p><strong>Traits:</strong> "+ch.traits.join(", ")+"</p>";if(ch.significance)h+="<p><strong>Significance:</strong> "+ch.significance+"</p>";if(ch.relationships)h+="<p><strong>Relationships:</strong> "+Object.entries(ch.relationships).map(([k,v])=>k+" ("+v+")").join(", ")+"</p>";if(ch.key_quotes)h+="<p><strong>Quotes:</strong> "+ch.key_quotes.map(q=>'"'+q+'"').join("; ")+"</p>";h+="</div>";});c.innerHTML=h;}

function renderThemes(c){let h="<h2>Themes</h2>";APP.themes.forEach(t=>{h+='<div class="card" id="item-'+t.id+'"><h3>'+t.name+'</h3><p>'+(t.definition||"")+'</p>';if(t.analysis)h+="<p><strong>Analysis:</strong> "+t.analysis+"</p>";if(t.related_characters)h+="<p><strong>Characters:</strong> "+tagChips(t.related_characters,"character")+"</p>";if(t.key_quotes)h+="<p><strong>Quotes:</strong> "+t.key_quotes.map(q=>'"'+q+'"').join("; ")+"</p>";h+="</div>";});c.innerHTML=h;}

function renderSymbols(c){if(!APP.symbols.length){c.innerHTML="<h2>Symbols</h2><p>No symbols added.</p>";return;}let h="<h2>Symbols</h2>";APP.symbols.forEach(s=>{h+='<div class="card" id="item-'+s.id+'"><h3>'+s.name+'</h3><p>'+(s.symbolism||"")+'</p>';if(s.related_theme)h+="<p><strong>Theme:</strong> "+tagChips([s.related_theme],"theme")+"</p>";h+="</div>";});c.innerHTML=h;}

function renderMoments(c){let h="<h2>Key Moments</h2>";APP.moments.forEach(m=>{h+='<div class="card" id="item-'+m.id+'"><h3>Ch.'+m.chapter+': '+m.title+'</h3><p>'+(m.summary||"")+'</p>';if(m.significance)h+="<p><strong>Significance:</strong> "+m.significance+"</p>";if(m.themes)h+="<p><strong>Themes:</strong> "+tagChips(m.themes,"theme")+"</p>";if(m.characters)h+="<p><strong>Characters:</strong> "+tagChips(m.characters,"character")+"</p>";h+="</div>";});c.innerHTML=h;}

function renderQuotes(c){let h="<h2>Quotations</h2>";APP.quotes.forEach(q=>{h+='<div class="card" id="item-'+q.id+'"><p style="font-style:italic">"'+q.text+'"</p><p><strong>— '+(q.speaker||"Unknown")+'</strong> (Ch.'+q.chapter+')</p>';if(q.context)h+="<p>"+q.context+"</p>";if(q.analysis)h+="<p><strong>Analysis:</strong> "+q.analysis+"</p>";if(q.themes)h+="<p><strong>Themes:</strong> "+tagChips(q.themes,"theme")+"</p>";if(q.characters_involved)h+="<p><strong>Characters:</strong> "+tagChips(q.characters_involved,"character")+"</p>";h+="</div>";});c.innerHTML=h;}

function renderVocab(c){if(!APP.vocab.length){c.innerHTML="<h2>Vocabulary</h2><p>No vocabulary added.</p>";return;}let h="<h2>Vocabulary</h2>";APP.vocab.forEach(w=>{h+='<div class="card"><h3>'+w.word+' <small>/'+(w.pron||"")+'/</small> – '+(w.part_of_speech||"")+'</h3><p><strong>Definition:</strong> '+(w.def_en||"")+'</p><p><strong>Collocations:</strong> '+(w.collocations||"")+'</p><p><strong>Quote:</strong> "'+(w.quote||"")+'"</p>';if(w.analysis)h+="<p><strong>Analysis:</strong> "+w.analysis+"</p>";if(w.thematic_sentence)h+="<p><strong>Thematic Sentence:</strong> "+w.thematic_sentence+"</p>";if(w.creative_sentence)h+="<p><strong>Creative Sentence:</strong> "+w.creative_sentence+"</p>";if(w.linked_themes)h+="<p><strong>Themes:</strong> "+tagChips(w.linked_themes,"theme")+"</p>";if(w.linked_characters)h+="<p><strong>Characters:</strong> "+tagChips(w.linked_characters,"character")+"</p>";h+="</div>";});c.innerHTML=h;}

function renderKnowledgeMap(c){let h="<h2>Knowledge Map</h2>";h+="<div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px\">";h+="<div><h3>👥 Characters</h3><ul>"+APP.characters.map(x=>"<li>"+x.name+"</li>").join("")+"</ul></div>";h+="<div><h3>🎭 Themes</h3><ul>"+APP.themes.map(t=>"<li><strong>"+t.name+"</strong>"+(t.related_characters?"<br>→ Characters: "+tagChips(t.related_characters,"character"):"")+"</li>").join("")+"</ul></div>";h+="<div><h3>🔷 Symbols</h3><ul>"+APP.symbols.map(s=>"<li><strong>"+s.name+"</strong>"+(s.related_theme?"<br>→ Theme: "+tagChips([s.related_theme],"theme"):"")+"</li>").join("")+"</ul></div>";h+="</div>";h+="<h3>🔗 Detailed Connections</h3><div style=\"background:var(--card);padding:12px;border-radius:8px\">";APP.themes.forEach(t=>{if(t.related_characters)h+="<p><strong>"+t.name+"</strong> → Characters: "+tagChips(t.related_characters,"character")+"</p>";});APP.symbols.forEach(s=>{if(s.related_theme)h+="<p><strong>"+s.name+"</strong> → Theme: "+tagChips([s.related_theme],"theme")+"</p>";});h+="</div>";c.innerHTML=h;}

let quizState=null;
function renderQuiz(c){if(!APP.quotes.length&&!APP.characters.length){c.innerHTML="<h2>Quiz</h2><p>Not enough data to generate a quiz.</p>";return;}const qs=[];APP.quotes.forEach(q=>{const chars=q.characters_involved&&q.characters_involved.length?q.characters_involved:[];if(chars.length&&q.speaker){const wrong=APP.characters.filter(x=>x.id!==chars[0]).map(x=>x.id).slice(0,3);qs.push({type:"quote_speaker",quote:q.text,answer:q.speaker,distractors:[...new Set(wrong)],quoteId:q.id});}});APP.quotes.forEach(q=>{if(q.themes&&q.themes.length){const wrong=APP.themes.filter(t=>t.id!==q.themes[0]).map(t=>t.name).slice(0,3);qs.push({type:"quote_theme",quote:q.text,answer:APP.themes.find(t=>t.id===q.themes[0])?.name||q.themes[0],distractors:wrong});}});APP.themes.forEach(t=>{if(t.related_characters&&t.related_characters.length){const rel=t.related_characters[0];const correct=APP.characters.find(c=>c.id===rel);if(correct){const wrong=APP.characters.filter(c=>c.id!==rel).map(c=>c.name).slice(0,3);qs.push({type:"theme_character",theme:t.name,answer:correct.name,distractors:wrong});}}});if(qs.length===0){c.innerHTML="<h2>Quiz</h2><p>No questions generated.</p>";return;}quizState={questions:qs.sort(()=>Math.random()-0.5),index:0,score:0,answered:false};showQuizQuestion(c);}
function showQuizQuestion(c){const q=quizState.questions[quizState.index];let prompt="",choices=[];if(q.type==="quote_speaker"){prompt="Who said this?";choices=[q.answer,...q.distractors];}else if(q.type==="quote_theme"){prompt="Which theme does this illustrate?";choices=[q.answer,...q.distractors];}else if(q.type==="theme_character"){prompt="Which character is linked to the theme <strong>"+q.theme+"</strong>?";choices=[q.answer,...q.distractors];}choices.sort(()=>Math.random()-0.5);c.innerHTML='<h2>Quiz</h2><div class="card">'+(q.quote?'<p style="font-style:italic;margin-bottom:12px">"'+q.quote+'"</p>':"")+'<p>'+prompt+'</p>'+choices.map(ch=>'<button class="quiz-btn" onclick="selectQuizAnswer(this,\''+ch+'\')">'+ch+'</button>').join("")+'<div id="quizFeedback" style="margin-top:12px"></div><button id="quizNextBtn" onclick="nextQuizQuestion()" style="display:none;margin-top:8px;padding:6px 14px;background:#1e7a2f;color:white;border:none;border-radius:4px;cursor:pointer">Next</button></div><p>Question '+(quizState.index+1)+' of '+quizState.questions.length+' | Score: '+quizState.score+'</p>';}
function selectQuizAnswer(btn,choice){if(quizState.answered)return;quizState.answered=true;const q=quizState.questions[quizState.index];const fb=document.getElementById("quizFeedback");if(choice===q.answer){fb.innerHTML='<span style="color:green">✅ Correct!</span>';quizState.score++;}else{fb.innerHTML='<span style="color:red">❌ Incorrect. The answer is: '+q.answer+'</span>';}document.getElementById("quizNextBtn").style.display="inline-block";document.querySelectorAll(".quiz-btn").forEach(b=>b.style.pointerEvents="none");}
function nextQuizQuestion(){quizState.index++;if(quizState.index>=quizState.questions.length){document.getElementById("content").innerHTML='<h2>Quiz Complete</h2><p>Your score: '+quizState.score+' / '+quizState.questions.length+'</p><button onclick="renderQuiz(document.getElementById(\'content\'))" style="padding:8px 16px;background:#1e7a2f;color:white;border:none;border-radius:6px;cursor:pointer">Retry</button>';return;}quizState.answered=false;showQuizQuestion(document.getElementById("content"));}
renderContent();
</script>
</body>
</html>
